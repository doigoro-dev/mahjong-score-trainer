<!DOCTYPE html>
<!--
Ver2.5 場風・自風対応
- 暗槓が複数ある場合のレスポンシブ表示に対応
- 三暗槓を含む三槓子問題を1問追加
- 暗槓ごとの符を合算して採点
- 既存117問との後方互換性を維持
-->
<!--
Ver2.1 役追加
- 三色同順、混全帯么九、純全帯么九、二盃口を追加
- 清一色、小三元、混老頭、三色同刻を追加
- 問題数を100問から108問へ拡張
- この版の追加問題は門前・槓子なし
-->
<!--
Ver1.6 レスポンシブ牌表示
- 表示領域に合わせて牌全体を自動縮小
- 牌サイズ、牌間隔、和了牌との間隔、和了牌ラベルを連動調整
- 横スクロールバーを廃止
- PCでは従来の最大サイズを維持
- スマートフォンや狭いブラウザ幅でも14枚全体を一画面に表示
-->
<!--
Ver1.5 翻数変化パターン方式
- 各問題に複数の付加条件パターンを自動生成
- セッション開始時に各問題の候補から1パターンをランダム選択
- 付加条件は立直・一発・ドラ・赤ドラ・裏ドラ
- 手牌・符・親子・ロン／ツモは元問題を維持
- 点数区分の境界を意識した候補を作成
- 副露は対象外
-->

<!--
Ver1.3 やり直し機能
- 通常の問題画面に「最初からやり直す」ボタンを追加
- 押下時に確認ダイアログを表示
- キャンセル時は現在の進捗を維持
- 確認時は出題順を再シャッフルして第1問から開始
-->

<!--
Ver1.2 セッション出題仕様
- セッション開始時にFisher-Yates方式で全117問をシャッフル
- 117問を一巡するまで同じ問題は再出題しない
- 「第n問（n / 112）」と「残りn問」を表示
- 117問終了後に完了画面と再挑戦ボタンを表示
- 再挑戦時は新しい順番で再シャッフル
- sessionStorageへ出題順、現在位置、回答表示状態を保存
- 同じタブでリロードした場合は途中から再開
-->

<!--
Ver1.1 問題管理情報
- 全117問に management メタデータを付与
- 管理項目: 符、翻、点数区分、親子、ロン／ツモ、待ち分類、主な役、切り上げ満貫
- 30符4翻: 0問
- 60符3翻: 10問
- 30符4翻は現在0問のため、今後の追加候補として自動検出可能
-->

<!--
品質保証情報
- 問題数: 117問
- 符別構成: 20符10問、25符10問、30符20問、40符20問、50符15問、60符25問
- 全問題の翻数合計を検証済み
- 全問題の符内訳と最終符を検証済み
- 親子・ロンツモ・符・翻から全点数を再計算済み
- 切り上げ満貫対象: 10問
- 対象ID: q026, q030, q081, q085, q086, q090, q091, q095, q096, q100
- 問題ID重複なし
- 通常問題は手牌13枚＋和了牌1枚、暗槓問題は構成上13枚分＋和了牌1枚
-->

<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>麻雀点数計算トレーナー 117問版 Ver2.6（実戦モード Step 1）</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2937;
      background: #f3f4f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      overflow-x: hidden;
    }

    button {
      font: inherit;
    }

    main {
      width: min(1260px, 100%);
      margin: 0 auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.10);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 1.7rem;
    }

    .subtitle {
      margin: 0 0 24px;
      text-align: center;
      color: #6b7280;
    }

    .question-number {
      margin-bottom: 14px;
      text-align: center;
      color: #64748b;
      font-weight: 700;
    }

    .question-info {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0;
      margin-bottom: 14px;
      flex-wrap: wrap;
      color: #334155;
      font-size: 0.98rem;
      font-weight: 700;
    }

    .info-card {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
    }

    .info-card + .info-card {
      border-left: 1px solid #cbd5e1;
    }

    .info-label {
      color: #64748b;
      font-size: 0.84rem;
      font-weight: 600;
    }

    .info-value {
      font-size: 1rem;
      font-weight: 800;
    }

    .timer-value {
      min-width: 5ch;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .stage {
      --tile-size: clamp(16px, calc((100vw - 150px) / 14), 74px);
      --tile-gap: clamp(1px, 0.45vw, 6px);
      --winning-gap: clamp(5px, 2vw, 26px);
      --winning-label-size: clamp(0.5rem, 1.7vw, 0.78rem);

      width: 100%;
      container-type: inline-size;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.94), rgba(240,253,250,0.94)),
        #ecfdf5;
      border: 1px solid #d1fae5;
      border-radius: 16px;
      padding: clamp(14px, 2.1vw, 26px) clamp(6px, 1.5vw, 18px);
      overflow-x: hidden;
    }

    @supports (width: 1cqw) {
      .stage {
        --tile-size: clamp(16px, calc((100cqw - 100px) / 14), 74px);
        --tile-gap: clamp(1px, 0.45cqw, 6px);
        --winning-gap: clamp(5px, 2cqw, 26px);
        --winning-label-size: clamp(0.5rem, 1.7cqw, 0.78rem);
      }
    }

    /* 暗槓の組数に応じ、物理的な牌数（15～18枚）が収まるよう段階的に縮小する。 */
    #completeHandContainer.has-concealed-kans-1 {
      --tile-size: clamp(15px, calc((100cqw - 130px) / 15), 66px);
      --tile-gap: clamp(0px, 0.28cqw, 4px);
      --winning-gap: clamp(4px, 1.2cqw, 16px);
    }

    #completeHandContainer.has-concealed-kans-2 {
      --tile-size: clamp(14px, calc((100cqw - 105px) / 16), 61px);
      --tile-gap: clamp(0px, 0.22cqw, 3px);
      --winning-gap: clamp(3px, 0.9cqw, 12px);
    }

    #completeHandContainer.has-concealed-kans-3,
    #completeHandContainer.has-concealed-kans-4 {
      --tile-size: clamp(13px, calc((100cqw - 78px) / 17), 57px);
      --tile-gap: clamp(0px, 0.16cqw, 2px);
      --winning-gap: clamp(2px, 0.65cqw, 8px);
    }

    #completeHandContainer.has-concealed-kans-3 .concealed-kan-section,
    #completeHandContainer.has-concealed-kans-4 .concealed-kan-section {
      gap: clamp(2px, 0.45cqw, 6px);
    }

    .complete-hand-row {
      display: flex;
      width: 100%;
      min-width: 0;
      align-items: flex-end;
      justify-content: center;
    }

    .concealed-hand {
      display: flex;
      min-width: 0;
      gap: var(--tile-gap);
      align-items: flex-end;
    }

    .concealed-tile-section {
      display: flex;
      min-width: 0;
      gap: var(--tile-gap);
      align-items: flex-end;
    }

    .concealed-kan-section {
      display: flex;
      flex: 0 0 auto;
      gap: var(--winning-gap);
      align-items: flex-end;
      margin-left: var(--winning-gap);
    }

    .concealed-kan-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 0 0 auto;
    }

    .concealed-kan-tiles {
      display: flex;
      gap: var(--tile-gap);
      align-items: flex-end;
    }

    .concealed-kan-label {
      margin-top: clamp(3px, 0.7cqw, 8px);
      color: #475569;
      font-size: var(--winning-label-size);
      line-height: 1.35;
      font-weight: 700;
      white-space: nowrap;
    }

    .winning-tile-area {
      display: flex;
      flex: 0 0 auto;
      flex-direction: column;
      align-items: center;
      margin-left: var(--winning-gap);
    }

    .winning-label {
      margin-top: clamp(3px, 0.7cqw, 8px);
      padding: clamp(1px, 0.25cqw, 3px) clamp(3px, 0.75cqw, 9px);
      border-radius: 999px;
      background: #dc2626;
      color: #ffffff;
      font-size: var(--winning-label-size);
      line-height: 1.35;
      font-weight: 700;
      white-space: nowrap;
    }

    .tile-wrapper {
      display: flex;
      flex: 0 0 var(--tile-size);
      width: var(--tile-size);
      min-width: 0;
      flex-direction: column;
      align-items: center;
    }

    .tile-svg {
      display: block;
      width: 100%;
      height: auto;
      filter: drop-shadow(
        0 clamp(2px, 0.55cqw, 7px)
        clamp(2px, 0.55cqw, 7px)
        rgba(0, 0, 0, 0.15)
      );
    }

    .thinking-message {
      margin: 20px 0 0;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      color: #475569;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
    }

    .score-response-panel {
      margin: 20px 0 0;
      padding: 16px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #cbd5e1;
    }

    .score-response-title {
      margin: 0 0 12px;
      text-align: center;
      color: #334155;
      font-size: 1rem;
    }

    .score-input-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .score-input-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .score-input-group label {
      font-weight: 700;
      color: #475569;
    }

    .score-input {
      width: 130px;
      border: 1px solid #94a3b8;
      border-radius: 9px;
      padding: 10px 12px;
      font: inherit;
      font-variant-numeric: tabular-nums;
      text-align: right;
      background: #ffffff;
    }

    .score-input:focus {
      outline: 3px solid rgba(37, 99, 235, 0.18);
      border-color: #2563eb;
    }

    .score-input-error {
      min-height: 1.5em;
      margin: 10px 0 0;
      text-align: center;
      color: #b91c1c;
      font-weight: 700;
    }

    .grading-result {
      margin-bottom: 16px;
      padding: 14px;
      border-radius: 12px;
      text-align: center;
      font-weight: 800;
    }

    .grading-result.correct {
      color: #166534;
      background: #dcfce7;
      border: 1px solid #86efac;
    }

    .grading-result.incorrect {
      color: #991b1b;
      background: #fee2e2;
      border: 1px solid #fca5a5;
    }

    .grading-result-detail {
      display: block;
      margin-top: 6px;
      font-weight: 600;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .button {
      min-width: 150px;
      border: 0;
      border-radius: 11px;
      padding: 12px 20px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button:active {
      transform: translateY(0);
    }

    .button-primary {
      color: #ffffff;
      background: #2563eb;
    }

    .button-secondary {
      color: #ffffff;
      background: #059669;
    }

    .button[hidden] {
      display: none;
    }

    .answer-panel {
      margin-top: 22px;
      padding: 20px;
      border-radius: 14px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
    }

    .answer-panel[hidden] {
      display: none;
    }

    .answer-panel h2 {
      margin: 0 0 14px;
      font-size: 1.15rem;
    }


    .mode-panel {
      margin: 18px 0 22px;
      padding: 16px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #cbd5e1;
    }

    .mode-panel-title {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #334155;
    }

    .mode-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .mode-button {
      padding: 10px 16px;
      border: 1px solid #94a3b8;
      border-radius: 10px;
      background: #ffffff;
      color: #334155;
      font-weight: 700;
      cursor: pointer;
    }

    .mode-button[aria-pressed="true"] {
      border-color: #2563eb;
      background: #dbeafe;
      color: #1d4ed8;
    }

    .mode-description {
      margin: 10px 0 0;
      color: #64748b;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .practical-flow-panel {
      margin: 0 0 18px;
      padding: 18px;
      border-radius: 14px;
      border: 1px solid #86efac;
      background: #f0fdf4;
    }

    .practical-flow-panel[hidden] {
      display: none;
    }

    .practical-step-label {
      margin: 0 0 6px;
      color: #166534;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .practical-flow-title {
      margin: 0 0 8px;
      color: #14532d;
      font-size: 1.12rem;
    }

    .practical-flow-message {
      margin: 0 0 14px;
      color: #365314;
      line-height: 1.7;
    }

    .practical-action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .practical-action-button {
      padding: 11px 18px;
      border: 1px solid #16a34a;
      border-radius: 10px;
      background: #ffffff;
      color: #166534;
      font-weight: 800;
      cursor: pointer;
    }

    .practical-action-button:hover {
      background: #dcfce7;
    }

    .practical-dora-area {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 8px 0 10px;
    }

    .practical-dora-block {
      min-width: 104px;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      background: #ffffff;
      text-align: center;
    }

    .practical-dora-title {
      margin: 0 0 5px;
      color: #334155;
      font-size: 0.82rem;
      font-weight: 800;
    }

    .practical-dora-tiles {
      display: flex;
      justify-content: center;
      gap: 4px;
    }

    .practical-dora-tiles .tile-wrapper {
      width: clamp(29px, 4.5vw, 44px);
    }

    .practical-result {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #ffffff;
      border: 1px solid #bbf7d0;
      color: #14532d;
      font-weight: 700;
      line-height: 1.7;
    }

    .condition-panel {
      margin: 0 0 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #fff7ed;
      border: 1px solid #fdba74;
      color: #9a3412;
      line-height: 1.7;
    }

    .condition-panel strong {
      display: block;
      margin-bottom: 4px;
    }

    .answer-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(110px, 1fr));
      gap: 12px;
    }

    .answer-item {
      padding: 12px;
      border-radius: 10px;
      background: #ffffff;
      border: 1px solid #dbeafe;
    }

    .answer-item strong {
      display: block;
      margin-bottom: 4px;
      color: #1d4ed8;
      font-size: 0.8rem;
    }

    .explanation {
      margin-top: 16px;
      color: #475569;
      line-height: 1.7;
    }

    .notice {
      margin-top: 22px;
      padding: 14px;
      border-radius: 12px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #92400e;
      font-size: 0.92rem;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      body {
        padding: 12px;
      }

      main {
        padding: 20px 14px;
      }

      .answer-grid {
        grid-template-columns: 1fr;
      }

      .question-info {
        font-size: 0.92rem;
      }

      .info-card {
        padding: 4px 8px;
      }

      .stage {
        padding-inline: 5px;
      }

      .button {
        width: 100%;
      }
    }

    @media (max-width: 420px) {
      body {
        padding: 6px;
      }

      main {
        padding: 16px 8px;
        border-radius: 12px;
      }

      h1 {
        font-size: 1.28rem;
      }

      .subtitle {
        font-size: 0.86rem;
      }

      .stage {
        --tile-size: clamp(15px, calc((100cqw - 66px) / 14), 28px);
        --tile-gap: clamp(0px, 0.25cqw, 2px);
        --winning-gap: clamp(3px, 1cqw, 7px);
        padding-inline: 3px;
      }

      #completeHandContainer.has-concealed-kans-1 {
        --tile-size: clamp(13px, calc((100cqw - 50px) / 15), 25px);
        --tile-gap: 0px;
        --winning-gap: clamp(2px, 0.8cqw, 5px);
      }

      #completeHandContainer.has-concealed-kans-2 {
        --tile-size: clamp(12px, calc((100cqw - 36px) / 16), 23px);
        --tile-gap: 0px;
        --winning-gap: clamp(1px, 0.6cqw, 4px);
      }

      #completeHandContainer.has-concealed-kans-3,
      #completeHandContainer.has-concealed-kans-4 {
        --tile-size: clamp(11px, calc((100cqw - 22px) / 17), 21px);
        --tile-gap: 0px;
        --winning-gap: clamp(1px, 0.4cqw, 3px);
      }

      .winning-label {
        font-size: clamp(0.43rem, 1.7cqw, 0.58rem);
      }
    }

  </style>
</head>
<body>
  <main>
    <h1>麻雀点数計算トレーナー Ver2.9</h1>
    <p class="subtitle">実戦モード：役なし・非立直時のツモ固定に対応</p>


    <section class="mode-panel" aria-label="出題モード" data-testid="mode-panel">
      <h2 class="mode-panel-title">出題モード</h2>
      <div class="mode-buttons">
        <button id="normalModeButton" class="mode-button" type="button" aria-pressed="true" data-testid="normal-mode">
          通常モード
        </button>
        <button id="hanVariationModeButton" class="mode-button" type="button" aria-pressed="false" data-testid="han-variation-mode">
          翻数変化モード
        </button>
        <button id="practicalModeButton" class="mode-button" type="button" aria-pressed="false" data-testid="practical-mode">
          実戦モード
        </button>
      </div>
      <p id="modeDescription" class="mode-description" data-testid="mode-description">
        手牌から役・翻・符・点数を計算します。
      </p>
    </section>

    <div id="questionNumber" class="question-number" data-testid="question-number"></div>
    <div id="remainingCount" class="question-number" aria-live="polite" data-testid="remaining-count"></div>

    <section id="questionInfo" class="question-info" data-testid="question-info"></section>

    <section id="practicalFlowPanel" class="practical-flow-panel" hidden aria-live="polite" data-testid="practical-flow-panel">
      <p id="practicalStepLabel" class="practical-step-label"></p>
      <h2 id="practicalFlowTitle" class="practical-flow-title"></h2>
      <p id="practicalFlowMessage" class="practical-flow-message"></p>
      <div id="practicalDoraArea" class="practical-dora-area" hidden></div>
      <div id="practicalActionRow" class="practical-action-row"></div>
      <div id="practicalResult" class="practical-result" hidden></div>
    </section>

    <section id="additionalConditionPanel" class="condition-panel" hidden data-testid="additional-condition-panel">
      <strong>付加条件</strong>
      <span id="additionalConditionText" data-testid="additional-condition-text"></span>
    </section>

    <section class="stage" aria-label="問題の手牌" data-testid="hand-stage">
      <div id="completeHandContainer" data-testid="complete-hand"></div>
    </section>

    <div id="thinkingMessage" class="thinking-message" data-testid="thinking-message">
      役・翻・符を脳内で計算し、実戦と同じように最終点数を入力してください。
    </div>

    <section id="scoreResponsePanel" class="score-response-panel" aria-label="点数回答" data-testid="score-response-panel">
      <h2 class="score-response-title">点数を入力</h2>
      <div id="scoreInputContainer" class="score-input-row" data-testid="score-input-container"></div>
      <p id="scoreInputError" class="score-input-error" aria-live="polite" data-testid="score-input-error"></p>
    </section>

    <div class="button-row">
      <button id="showAnswerButton" class="button button-primary" type="button" data-testid="show-answer">
        採点する
      </button>

      <button id="nextQuestionButton" class="button button-secondary" type="button" hidden data-testid="next-question">
        次の問題
      </button>
      <button id="restartFromBeginningButton" class="button button-secondary" type="button" data-testid="restart-from-beginning">
        最初からやり直す
      </button>
    </div>

    <section id="answerPanel" class="answer-panel" hidden data-testid="answer-panel">
      <div id="gradingResult" class="grading-result" aria-live="polite" data-testid="grading-result"></div>
      <h2>正解</h2>
      <div id="answerGrid" class="answer-grid" data-testid="answer-grid"></div>
      <div id="answerExplanation" class="explanation" data-testid="answer-explanation"></div>
    </section>

    <section id="completionPanel" class="answer-panel" hidden data-testid="completion-panel">
      <h2>🎉 全117問終了しました！</h2>
      <p>今回のセッションでは、全117問を重複なしで1回ずつ出題しました。</p>
      <div class="button-row">
        <button id="restartSessionButton" class="button button-primary" type="button" data-testid="restart-session">
          もう一度挑戦する
        </button>
      </div>
    </section>

    <div class="notice">
      通常モードは基本の点数計算、翻数変化モードは付加条件込みの点数計算を練習します。実戦モードでは、表ドラを確認して立直判断→和了結果→立直時のみ裏ドラを確認し、そのまま最終点数を入力します。立直・ドラ・裏ドラは自動で翻数と点数へ反映されます。
    </div>
  </main>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
